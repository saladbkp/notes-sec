<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your OTP Code</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0;">
    <div style="max-width: 600px; margin: 20px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <div style="background-color: #333333; padding: 20px; text-align: center;">
            <h1 style="color: #ffffff; margin: 0; font-size: 24px;">Security Alert</h1>
        </div>
        
        <div style="padding: 30px; text-align: center;">
            <p style="color: #666666; font-size: 16px; margin-bottom: 20px;">
                You requested an OTP to unblock your account.
            </p>
            
            <div style="background-color: #f0f0f0; border-radius: 4px; padding: 15px; margin: 20px 0; display: inline-block;">
                <h2 style="color: #333333; margin: 0; font-size: 32px; letter-spacing: 5px; font-family: monospace;">
                    {{otp}}
                </h2>
            </div>
            
            <p style="color: #888888; font-size: 14px; margin-top: 20px;">
                This code will expire in 5 minutes.<br>
                If you did not request this, please ignore this email.
            </p>
            
            <div style="margin-top: 30px; border-top: 1px solid #eeeeee; padding-top: 20px;">
                <p style="color: #999999; font-size: 12px;">
                    Request from IP: {{ip_address}}<br>
                    Time: {{timestamp}}
                </p>
            </div>
        </div>
    </div>
</body>
</html>
